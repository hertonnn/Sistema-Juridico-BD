<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acórdão na Íntegra | JusDigital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .texto-acordao {
            white-space: pre-wrap;
            background-color: #f9fafb;
            padding: 25px;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            color: #374151;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="assets/img/logo-sistema.svg" alt="Logo Sistema Jurídico" class="logo-img" onerror="this.style.display='none';">
                <span class="logo-text">Jus<strong>Digital</strong></span>
            </a>
            <nav class="main-nav">
                <a href="processos.html">Processos</a>
                <a href="jurisprudencia.html" class="active">Jurisprudência</a>
                <a href="advogados.html">Advogados</a>
            </nav>
            <div class="user-actions">
                <a href="login.html" class="btn btn-outline">Entrar</a>
            </div>
        </div>
    </header>

    <main class="content-section container">
        <div class="action-bar">
            <a href="jurisprudencia.html" class="btn btn-outline btn-sm">&larr; Voltar para Jurisprudência</a>
        </div>

        <div id="acordao-container"></div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 JusDigital - Sistema Jurídico. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var container = document.getElementById('acordao-container');

        if (!id) {
            container.innerHTML = '<div class="process-details-card"><h2>Item não especificado.</h2></div>';
        } else {
            container.innerHTML = '<div style="text-align:center; padding: 40px;">Carregando detalhes...</div>';
            fetch('/api/lei?id=' + id)
                .then(res => {
                    if (!res.ok) throw new Error('Not found');
                    return res.json();
                })
                .then(lei => {
                    var processosHtml = '';
                    if (lei.processos && lei.processos.length > 0) {
                        processosHtml = '<ul style="list-style: none; padding: 0;">';
                        lei.processos.forEach(p => {
                            processosHtml += '<li style="margin-bottom: 15px; padding: 15px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;">' +
                                '<strong><a href="visualizar_processo.html?id=' + p.id + '">' + p.numero + '</a></strong> - ' + p.tipo + '<br>' +
                                '<span style="color: var(--text-muted); font-size: 0.95em;">Citação base: ' + (p.artigo || 'Geral') + '</span>' +
                            '</li>';
                        });
                        processosHtml += '</ul>';
                    } else {
                        processosHtml = '<p style="color: var(--text-muted);">Nenhum processo referenciando esta base legal no momento.</p>';
                    }

                    container.innerHTML = '<div class="process-details-card">' +
                        '<div class="process-header-info" style="border-bottom: none; padding-bottom: 0; margin-bottom: 10px;">' +
                            '<div><h2>' + (lei.titulo || 'Base Legal') + '</h2></div>' +
                        '</div>' +
                        '<div class="juris-meta" style="margin-bottom: 25px;">' +
                            '<span><strong>Tipo:</strong> Legislação / Jurisprudência</span>' +
                        '</div>' +
                        '<p class="juris-ementa" style="background: #eef2ff; padding: 15px; border-left: 4px solid var(--primary-color); border-radius: 4px;">' +
                            '<strong>RESUMO / DESCRIÇÃO:</strong> <br>' + (lei.descricao || 'Não informado.') +
                        '</p>' +
                        '<hr class="divider">' +
                        '<h3>Processos no Sistema que Citam Esta Base</h3>' +
                        '<div style="margin-top: 20px;">' + processosHtml + '</div>' +
                    '</div>';
                })
                .catch(err => {
                    container.innerHTML = '<div class="process-details-card">' +
                        '<h2>Registro não encontrado.</h2>' +
                        '<p>O documento solicitado não existe ou erro no servidor.</p>' +
                    '</div>';
                });
        }
    </script>
    <script src="auth.js"></script>
</body>
</html>
