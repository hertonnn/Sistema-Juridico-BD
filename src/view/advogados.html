<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advogados | JusDigital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="assets/img/logo-sistema.svg" alt="Logo Sistema Jurídico" class="logo-img" onerror="this.style.display='none';">
                <span class="logo-text">Jus<strong>Digital</strong></span>
            </a>
            <nav class="main-nav">
                <a href="processos.html">Processos</a>
                <a href="jurisprudencia.html">Jurisprudência</a>
                <a href="advogados.html" class="active">Advogados</a>
            </nav>
            <div class="user-actions">
                <a href="login.html" class="btn btn-outline">Entrar</a>
            </div>
        </div>
    </header>

    <main class="content-section container">
        <div class="page-header" style="text-align: center; margin-bottom: 40px;">
            <h2>Corpo Técnico de Advogados</h2>
            <p>Profissionais vinculados e habilitados para a representação jurídica e acompanhamento processual.</p>
        </div>

        <div class="advogados-grid" id="advogados-grid">
            <div style="text-align:center; padding: 20px; grid-column: 1 / -1;">Carregando advogados...</div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 JusDigital - Sistema Jurídico. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var grid = document.getElementById('advogados-grid');
            fetch('/api/advogados')
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center;">Nenhum advogado cadastrado.</div>';
                        return;
                    }
                    var html = '';
                    data.forEach(adv => {
                        html += '<div class="adv-card">' +
                            '<div class="adv-avatar">⚖️</div>' +
                            '<h3>' + (adv.nome || 'Advogado(a)') + '</h3>' +
                            '<p class="adv-oab">' + (adv.oab || '') + '</p>' +
                            '<p class="adv-spec"><strong>Especialidade:</strong> ' + (adv.area || 'Geral') + '</p>' +
                            '<a href="perfil_advogado.html?id=' + adv.id + '" class="btn btn-outline" style="display:block;margin-top:20px;">Ver Perfil</a>' +
                        '</div>';
                    });
                    grid.innerHTML = html;
                })
                .catch(err => {
                    grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: red;">Erro ao carregar advogados do servidor.</div>';
                });
        });
    </script>
    <script src="auth.js"></script>
</body>
</html>
