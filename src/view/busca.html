<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados da Busca | JusDigital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <span class="logo-text">Jus<strong>Digital</strong></span>
            </a>
            <nav class="main-nav">
                <a href="processos.html">Processos</a>
                <a href="jurisprudencia.html">Jurisprudência</a>
                <a href="advogados.html">Advogados</a>
            </nav>
        </div>
    </header>

    <main class="content-section container">
        <div class="action-bar">
            <a href="index.html" class="btn btn-outline btn-sm">&larr; Voltar ao Início</a>
        </div>

        <div class="page-header">
            <h2>Resultados da Busca</h2>
            <p>Exibindo resultados para: <strong id="query-display">""</strong></p>
        </div>

        <div id="results-container"></div>
    </main>

    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var query = (params.get('query') || '').trim();
        document.getElementById('query-display').textContent = '"' + query + '"';

        function contains(haystack, needle) {
            if(!haystack) return false;
            return haystack.toLowerCase().indexOf(needle.toLowerCase()) !== -1;
        }

        var container = document.getElementById('results-container');
        if (!query) {
            container.innerHTML = '<div class="shadow-sm" style="background: var(--bg-white); padding: 40px; text-align: center; border-radius: 8px; border: 1px solid var(--border-color);">' +
                '<p class="text-muted" style="font-size: 1.2rem;">Nenhuma pesquisa informada.</p></div>';
            return;
        }

        container.innerHTML = '<div style="text-align:center; padding: 20px;">Buscando dados no servidor...</div>';

        // Busca todos os dados reais das APIs
        Promise.all([
            fetch('/api/processos').then(res => res.json()),
            fetch('/api/advogados').then(res => res.json()),
            fetch('/api/leis').then(res => res.json())
        ])
        .then(([processosData, advogadosData, leisData]) => {
            var rProcessos = processosData.filter(function(p) { 
                return contains(p.numero, query) || contains(p.assunto, query) || contains(p.tipo, query); 
            });
            
            var rAdvogados = advogadosData.filter(function(a) { 
                return contains(a.nome, query) || contains(a.oab, query) || contains(a.area, query); 
            });
            
            var rLeis = leisData.filter(function(l) { 
                return contains(l.titulo, query) || contains(l.detalhe, query); 
            });

            var total = rProcessos.length + rAdvogados.length + rLeis.length;
                if (total === 0) {
                    container.innerHTML = '<div class="shadow-sm" style="background: var(--bg-white); padding: 40px; text-align: center; border-radius: 8px; border: 1px solid var(--border-color);">' +
                        '<p class="text-muted" style="font-size: 1.2rem;">Nenhum registro encontrado para esta pesquisa.</p></div>';
                    return;
                }

                var html = '';
                if (rProcessos.length > 0) {
                    html += '<h3 style="margin: 30px 0 15px 0; color: var(--text-dark);">Processos Encontrados (Banco de Dados)</h3>';
                    html += '<div class="shadow-sm" style="background: var(--bg-white); border-radius: 8px; border: 1px solid var(--border-color); padding: 0 20px;">';
                    rProcessos.forEach(function(p) {
                        html += '<div class="doc-item"><div class="doc-info"><h4>Processo nº ' + (p.numero || 'N/A') + '</h4><p class="text-muted">' + (p.tipo || 'Sem tipo') + ' | ' + (p.assunto || 'Sem assunto') + '</p></div><a href="visualizar_processo.html?id=' + p.id + '" class="btn btn-outline btn-sm">Visualizar</a></div>';
                    });
                    html += '</div>';
                }
                if (rAdvogados.length > 0) {
                    html += '<h3 style="margin: 30px 0 15px 0; color: var(--text-dark);">Advogados Encontrados</h3>';
                    html += '<div class="cards-grid">';
                    rAdvogados.forEach(function(a) {
                        html += '<div class="card"><span class="profile-tag">' + a.area + '</span><h3 style="margin-top: 10px; margin-bottom: 5px;">' + a.nome + '</h3><p class="text-muted" style="font-size: 0.9rem; margin-bottom: 20px;">' + a.oab + '</p><a href="advogados.html" class="btn btn-primary btn-sm" style="width: 100%; text-align: center; text-decoration: none;">Ver Perfil</a></div>';
                    });
                    html += '</div>';
                }
                if (rLeis.length > 0) {
                    html += '<h3 style="margin: 30px 0 15px 0; color: var(--text-dark);">Legislação e Leis</h3>';
                    html += '<div class="shadow-sm" style="background: var(--bg-white); border-radius: 8px; border: 1px solid var(--border-color); padding: 0 20px;">';
                    rLeis.forEach(function(l) {
                        html += '<div class="doc-item"><div class="doc-info"><h4>' + l.titulo + '</h4><p class="text-muted">' + l.detalhe + '</p></div><a href="modelos.html" class="btn btn-outline btn-sm">Ver Modelos</a></div>';
                    });
                    html += '</div>';
                }
                container.innerHTML = html;
            })
            .catch(err => {
                container.innerHTML = '<div class="shadow-sm" style="background: var(--bg-white); padding: 40px; text-align: center; border-radius: 8px; border: 1px solid var(--border-color);"><p class="text-muted" style="color: red !important;">Erro ao buscar dados no servidor.</p></div>';
            });
    })();
    </script>

</body>
</html>
