<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurisprudência | JusDigital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="assets/img/logo-sistema.svg" alt="Logo Sistema Jurídico" class="logo-img" onerror="this.style.display='none';">
                <span class="logo-text">Jus<strong>Digital</strong></span>
            </a>
            <nav class="main-nav">
                <a href="processos.html">Processos</a>
                <a href="jurisprudencia.html" class="active">Jurisprudência</a>
                <a href="advogados.html">Advogados</a>
            </nav>
            <div class="user-actions">
                <a href="login.html" class="btn btn-outline">Entrar</a>
            </div>
        </div>
    </header>

    <main class="content-section container">
        <div class="page-header">
            <h2>Jurisprudência e Decisões</h2>
            <p>Repositório de acórdãos, ementas e súmulas dos tribunais parceiros.</p>
        </div>

        <div class="juris-list" id="juris-list">
            <div style="text-align:center; padding: 20px;">Carregando jurisprudência e leis...</div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 JusDigital - Sistema Jurídico. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var list = document.getElementById('juris-list');
            fetch('/api/leis')
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        list.innerHTML = '<div style="text-align: center;">Nenhum registro encontrado.</div>';
                        return;
                    }
                    var html = '';
                    data.forEach(lei => {
                        html += '<div class="juris-card">' +
                            '<h3>' + (lei.titulo || 'Sem Título') + '</h3>' +
                            '<div class="juris-meta"><span><strong>Tipo:</strong> Legislação / Jurisprudência Base</span></div>' +
                            '<p class="juris-ementa"><strong>Detalhes:</strong> ' + (lei.detalhe || 'N/A') + '</p>' +
                            '<a href="acordao.html?id=' + lei.id + '" class="btn-link">Acessar detalhes &rarr;</a>' +
                        '</div>';
                    });
                    list.innerHTML = html;
                })
                .catch(err => {
                    list.innerHTML = '<div style="text-align: center; color: red;">Erro ao carregar dados do servidor.</div>';
                });
        });
    </script>
</body>
</html>
