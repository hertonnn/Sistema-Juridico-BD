<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Advogado | JusDigital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="assets/img/logo-sistema.svg" alt="Logo Sistema Jurídico" class="logo-img" onerror="this.style.display='none';">
                <span class="logo-text">Jus<strong>Digital</strong></span>
            </a>
            <nav class="main-nav">
                <a href="processos.html">Processos</a>
                <a href="jurisprudencia.html">Jurisprudência</a>
                <a href="advogados.html" class="active">Advogados</a>
            </nav>
            <div class="user-actions">
                <a href="login.html" class="btn btn-outline">Entrar</a>
            </div>
        </div>
    </header>

    <main class="content-section container">
        <div class="action-bar">
            <a href="advogados.html" class="btn btn-outline btn-sm">&larr; Voltar para Advogados</a>
        </div>

        <div id="perfil-container"></div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 JusDigital - Sistema Jurídico. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var container = document.getElementById('perfil-container');

        if (!id) {
            container.innerHTML = '<div class="process-details-card"><h2>Advogado não especificado.</h2></div>';
        } else {
            container.innerHTML = '<div style="text-align:center; padding: 40px;">Carregando dados do advogado...</div>';
            fetch('/api/advogado?id=' + id)
                .then(res => {
                    if (!res.ok) throw new Error('Not found');
                    return res.json();
                })
                .then(adv => {
                    var processosHtml = '';
                    if (adv.processos && adv.processos.length > 0) {
                        processosHtml = '<ul style="list-style: none; padding: 0;">';
                        adv.processos.forEach(p => {
                            processosHtml += '<li style="margin-bottom: 10px; padding: 10px; background: var(--bg-color); border-radius: 8px;">' +
                                '<strong><a href="visualizar_processo.html?id=' + p.id + '">' + p.numero + '</a></strong><br>' +
                                '<span style="color: var(--text-muted); font-size: 0.9em;">' + p.tipo + '</span>' +
                            '</li>';
                        });
                        processosHtml += '</ul>';
                    } else {
                        processosHtml = '<p style="color: var(--text-muted);">Nenhum processo vinculado no momento.</p>';
                    }

                    container.innerHTML = '<div class="profile-layout">' +
                        '<aside class="profile-sidebar shadow-sm">' +
                            '<div class="profile-photo-placeholder">⚖️</div>' +
                            '<h2 class="profile-name">' + adv.nome + '</h2>' +
                            '<p class="profile-oab">' + adv.oab + '</p>' +
                            '<div class="profile-contact">' +
                                '<p>📄 CPF/CNPJ: ' + (adv.cpf || 'Não informado') + '</p>' +
                            '</div>' +
                        '</aside>' +
                        '<section class="profile-main shadow-sm">' +
                            '<div class="profile-section">' +
                                '<h3>Área de Atuação</h3>' +
                                '<span class="profile-tag">' + (adv.area || 'Geral') + '</span>' +
                            '</div>' +
                            '<hr class="divider">' +
                            '<div class="profile-section">' +
                                '<h3>Processos Vinculados</h3>' +
                                processosHtml +
                            '</div>' +
                        '</section>' +
                    '</div>';
                })
                .catch(err => {
                    container.innerHTML = '<div class="process-details-card">' +
                        '<h2>Advogado não encontrado ou erro no servidor.</h2>' +
                    '</div>';
                });
        }
    </script>
    <script src="auth.js"></script>
</body>
</html>
