<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processos | JusDigital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="assets/img/logo-sistema.svg" alt="Logo Sistema Jurídico" class="logo-img" onerror="this.style.display='none';">
                <span class="logo-text">Jus<strong>Digital</strong></span>
            </a>
            <nav class="main-nav">
                <a href="processos.html" class="active">Processos</a>
                <a href="jurisprudencia.html">Jurisprudência</a>
                <a href="advogados.html">Advogados</a>
            </nav>
            <div class="user-actions">
                <a href="login.html" class="btn btn-outline">Entrar</a>
            </div>
        </div>
    </header>

    <main class="content-section container">
        <div class="page-header">
            <h2>Consulta de Processos Judiciais</h2>
            <p>Gerenciamento e histórico cronológico dos trâmites ativos e arquivados.</p>
        </div>

        <div class="table-responsive shadow-sm">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nº do Processo</th>
                        <th>Tipo</th>
                        <th>Assunto</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="processos-tbody">
                    <!-- Preenchido via JavaScript -->
                    <tr><td colspan="5" style="text-align: center;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 JusDigital - Sistema Jurídico. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/processos')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('processos-tbody');
                    tbody.innerHTML = ''; // Limpa o "Carregando..."
                    
                    if(data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Nenhum processo encontrado.</td></tr>';
                        return;
                    }
                    
                    data.forEach(p => {
                        let statusClass = "status-progress";
                        if(p.status && p.status.toLowerCase().includes("encerrado") || p.status.toLowerCase().includes("julgado")) statusClass = "status-success";
                        if(p.status && p.status.toLowerCase().includes("suspenso")) statusClass = "status-warning";
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${p.numero || 'N/A'}</strong></td>
                            <td>${p.tipo || '-'}</td>
                            <td>${p.assunto || '-'}</td>
                            <td><span class="status-badge ${statusClass}">${p.status || '-'}</span></td>
                            <td><a href="visualizar_processo.html?id=${p.id}" class="btn btn-primary btn-sm">Visualizar</a></td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Erro ao buscar processos:', error);
                    const tbody = document.getElementById('processos-tbody');
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Erro ao carregar dados.</td></tr>';
                });
        });
    </script>

    <script src="auth.js"></script>
</body>
</html>
