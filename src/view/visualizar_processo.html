<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Processo | JusDigital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="assets/img/logo-sistema.svg" alt="Logo Sistema Jurídico" class="logo-img" onerror="this.style.display='none';">
                <span class="logo-text">Jus<strong>Digital</strong></span>
            </a>
            <nav class="main-nav">
                <a href="processos.html" class="active">Processos</a>
                <a href="jurisprudencia.html">Jurisprudência</a>
                <a href="advogados.html">Advogados</a>
            </nav>
            <div class="user-actions">
                <a href="login.html" class="btn btn-outline">Entrar</a>
            </div>
        </div>
    </header>

    <main class="content-section container">
        <div class="action-bar">
            <a href="processos.html" class="btn btn-outline btn-sm">&larr; Voltar para Processos</a>
        </div>

        <div id="processo-container"></div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 JusDigital - Sistema Jurídico. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var container = document.getElementById('processo-container');

        if (id) {
            container.innerHTML = '<div style="text-align:center; padding: 20px;">Carregando dados do processo...</div>';
            
            fetch('/api/processo?id=' + id)
                .then(response => {
                    if(!response.ok) throw new Error('Processo não encontrado');
                    return response.json();
                })
                .then(p => {
                    let statusClass = "status-progress";
                    if(p.status && (p.status.toLowerCase().includes("encerrado") || p.status.toLowerCase().includes("julgado") || p.status.toLowerCase().includes("concluído"))) statusClass = "status-success";
                    if(p.status && p.status.toLowerCase().includes("suspenso")) statusClass = "status-warning";
                    
                    let partesHtml = '';
                    if(p.partes && p.partes.length > 0) {
                        p.partes.forEach(parte => {
                            partesHtml += '<p><strong>' + parte.tipo + ':</strong> ' + parte.nome + '</p>';
                        });
                    } else {
                        partesHtml = '<p>Nenhuma parte vinculada.</p>';
                    }

                    let tramitesHtml = '';
                    if(p.tramites && p.tramites.length === 0) {
                        tramitesHtml = '<p style="color: #666;">Nenhum trâmite registrado até o momento.</p>';
                    } else {
                        p.tramites.forEach(t => {
                            tramitesHtml += '<div class="timeline-item">' +
                                '<span class="timeline-date">' + t.data + '</span>' +
                                '<p><strong>' + t.tipo + ':</strong> ' + t.descricao + '</p>' +
                            '</div>';
                        });
                    }

                    container.innerHTML = '<div class="process-details-card">' +
                        '<div class="process-header-info">' +
                            '<div>' +
                                '<h2>Processo Nº ' + (p.numero || 'N/A') + '</h2>' +
                                '<p class="text-muted">' + (p.vara || 'Vara não identificada') + ' - Assunto: ' + (p.assunto || 'N/A') + '</p>' +
                            '</div>' +
                            '<div>' +
                                '<span class="status-badge ' + statusClass + '">' + (p.status || 'Desconhecido') + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="process-parties">' +
                            partesHtml +
                            '<p><strong>Data de Início:</strong> ' + (p.data_inicio || 'N/A') + '</p>' +
                        '</div>' +
                        '<hr class="divider">' +
                        '<div style="display: flex; justify-content: space-between; align-items: center;">' +
                            '<h3>Resumo Inteligente</h3>' +
                            '<button id="btn-gerar-resumo" class="btn btn-primary btn-sm">Gerar Resumo</button>' +
                        '</div>' +
                        '<div id="resumo-ia-container" style="display:none; margin-top: 15px; padding: 15px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;">' +
                            '<div id="resumo-ia-content"></div>' +
                        '</div>' +
                        '<hr class="divider">' +
                        '<h3>Histórico de Trâmites</h3>' +
                        '<div class="timeline">' +
                            tramitesHtml +
                        '</div>' +
                    '</div>';

                    // Lógica para gerar o resumo
                    document.getElementById('btn-gerar-resumo').addEventListener('click', function() {
                        const btn = this;
                        const resumoContainer = document.getElementById('resumo-ia-container');
                        const resumoContent = document.getElementById('resumo-ia-content');

                        btn.disabled = true;
                        btn.innerText = 'Gerando...';
                        resumoContainer.style.display = 'block';
                        resumoContent.innerHTML = '<div style="text-align:center; color:#6b7280;">⏳ Processando informações com Inteligência Artificial, por favor aguarde...</div>';

                        const partesStr = p.partes && p.partes.length > 0 
                            ? p.partes.map(parte => parte.tipo + ': ' + parte.nome).join(', ') 
                            : 'Nenhuma parte vinculada.';
                        
                        let tramitesStr = 'Nenhum trâmite registrado.';
                        if (p.tramites && p.tramites.length > 0) {
                            const parseDate = (d) => {
                                if (!d) return 0;
                                const parts = d.split(/[\/\- ]/);
                                if (parts.length >= 3 && parts[2].length === 4) {
                                    return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`).getTime();
                                }
                                return new Date(d).getTime();
                            };
                            const tramitesOrdenados = [...p.tramites].sort((a, b) => parseDate(a.data) - parseDate(b.data));
                            tramitesStr = '\n' + tramitesOrdenados.map((t, index) => {
                                return `Trâmite ${index + 1}:\n- Data: ${t.data}\n- Tipo: ${t.tipo}\n- Descrição: ${t.descricao}`;
                            }).join('\n\n');
                        }

                        const processDataPayload = `
Processo Nº: ${p.numero || 'N/A'}
Vara: ${p.vara || 'N/A'}
Assunto: ${p.assunto || 'N/A'}
Status: ${p.status || 'N/A'}
Data de Início: ${p.data_inicio || 'N/A'}
Partes: ${partesStr}
Trâmites: ${tramitesStr}
                        `.trim();
                        
                        console.log(processDataPayload)
                        fetch('http://localhost:8000/summary', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ process_data: processDataPayload })
                        })
                        .then(response => {
                            if (!response.ok) throw new Error('Erro ao gerar resumo da API externa.');
                            return response.json();
                        })
                        .then(data => {
                            btn.innerText = 'Resumo Gerado';
                            resumoContent.innerHTML = '<p style="white-space: pre-wrap; margin-top: 10px;">' + data.summary + '</p>';
                        })
                        .catch(error => {
                            btn.disabled = false;
                            btn.innerText = 'Tentar Novamente';
                            resumoContent.innerHTML = '<div style="color:#ef4444;">❌ Ocorreu um erro ao gerar o resumo: ' + error.message + '</div>';
                        });
                    });
                })
                .catch(error => {
                    container.innerHTML = '<div class="process-details-card">' +
                        '<h2>Processo não encontrado.</h2>' +
                        '<p>O processo solicitado não existe no banco de dados ou ocorreu um erro na busca.</p>' +
                    '</div>';
                });
        } else {
            container.innerHTML = '<div class="process-details-card">' +
                '<h2>ID não fornecido.</h2>' +
                '<p>Por favor, volte e selecione um processo na lista de processos.</p>' +
            '</div>';
        }
    </script>
    <script src="auth.js"></script>
</body>
</html>
